name: Repo Guards

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce no signing identifiers / secret artifacts
        shell: bash
        run: |
          set -euo pipefail

          echo "[1/2] scanning tracked files for forbidden patterns"

          # File-extension based secrets/certs/profiles that should never be tracked
          bad_files=$(git ls-files | grep -E '\.(p12|pfx|mobileprovision|provisionprofile|cer|crt|key|pem|p8|jks|keystore)$|(^|/)AuthKey_.*\.p8$|(^|/)\.env(\..*)?$' || true)
          if [[ -n "${bad_files}" ]]; then
            echo "❌ Forbidden secret/signing artifact files tracked:"
            echo "${bad_files}"
            exit 1
          fi

          # Content patterns in tracked files (exclude docs/policies and local ignored folders)
          bad_content=$(git grep -nE 'DEVELOPMENT_TEAM\s*=\s*[A-Z0-9]{10};|TEAM_ID\s*=\s*[A-Z0-9]{10}|PROVISIONING_PROFILE_SPECIFIER\s*=|PROVISIONING_PROFILE\s*=|CODE_SIGN_IDENTITY\s*=\s*"?iPhone Developer"?' -- \
            ':(exclude)README.md' \
            ':(exclude)PROMPT.md' \
            ':(exclude)APP_STORE_DEPLOYMENT.md' \
            ':(exclude)SECURITY_OWASP_TOP10.md' \
            ':(exclude)RELEASE_NOTES.md' \
            ':(exclude)XcodeProjectTemplate/.local/*' || true)

          if [[ -n "${bad_content}" ]]; then
            echo "❌ Forbidden signing/team patterns found in tracked code/config:"
            echo "${bad_content}"
            exit 1
          fi

          echo "✅ signing/secrets guard passed"

      - name: Enforce iOS version/build policy
        shell: bash
        run: |
          set -euo pipefail

          echo "[2/2] validating iOS version/build policy"

          APP_PLIST="XcodeProjectTemplate/Config/OpenF1DashboardiOSApp-Info.plist"
          WIDGET_PLIST="XcodeProjectTemplate/Config/OpenF1DashboardiOSWidget-Info.plist"

          for f in "$APP_PLIST" "$WIDGET_PLIST"; do
            [[ -f "$f" ]] || { echo "❌ missing file: $f"; exit 1; }

            # Must use build settings indirection, not hardcoded literal values
            grep -q '<key>CFBundleShortVersionString</key>' "$f" || { echo "❌ missing CFBundleShortVersionString in $f"; exit 1; }
            grep -q '<string>\$(MARKETING_VERSION)</string>' "$f" || { echo "❌ CFBundleShortVersionString must use $(MARKETING_VERSION) in $f"; exit 1; }

            grep -q '<key>CFBundleVersion</key>' "$f" || { echo "❌ missing CFBundleVersion in $f"; exit 1; }
            grep -q '<string>\$(CURRENT_PROJECT_VERSION)</string>' "$f" || { echo "❌ CFBundleVersion must use $(CURRENT_PROJECT_VERSION) in $f"; exit 1; }
          done

          PBXPROJ="XcodeProjectTemplate/OpenF1Dashboard.xcodeproj/project.pbxproj"
          [[ -f "$PBXPROJ" ]] || { echo "❌ missing file: $PBXPROJ"; exit 1; }

          # Ensure date-like MARKETING_VERSION exists (YYYY.MM.DD)
          if ! grep -Eq 'MARKETING_VERSION = [0-9]{4}\.[0-9]{2}\.[0-9]{2};' "$PBXPROJ"; then
            echo "❌ MARKETING_VERSION must be date formatted YYYY.MM.DD in project.pbxproj"
            exit 1
          fi

          # Ensure numeric build number exists
          if ! grep -Eq 'CURRENT_PROJECT_VERSION = [0-9]+;' "$PBXPROJ"; then
            echo "❌ CURRENT_PROJECT_VERSION must be numeric in project.pbxproj"
            exit 1
          fi

          echo "✅ version/build policy guard passed"
